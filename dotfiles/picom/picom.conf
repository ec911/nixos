# Backend
backend = "glx";

# VSync
vsync = true;

# General
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

# Shadows (adjust to taste)
shadow = false;

# Fading (optional, disable if you want snappier feel)
fading = false;
